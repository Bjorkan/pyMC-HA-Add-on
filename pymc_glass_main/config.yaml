name: "pyMC Glass Main"
version: "1.0.0"
slug: "pymc_glass_main"
description: "Main-tracking pyMC Glass add-on for Home Assistant"
url: "https://github.com/pyMC-dev/pyMC-HA-Add-on"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
host_network: true
webui: "http://[HOST]:[PORT:5173]/"
ports:
  5173/tcp: 5173
  8883/tcp: 8883
ports_description:
  5173/tcp: "pyMC Glass web UI"
  8883/tcp: "pyMC Glass managed MQTT broker"
map:
  - type: addon_config
    path: /config
    read_only: false
  - type: data
    path: /var/lib/pymc_glass
    read_only: false
apparmor: false
full_access: true
init: true
options:
  config_location_note: "addon_config/*_pymc_glass_main/config.yaml"
schema:
  config_location_note: str
